<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>한글 동물원</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦁</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 타이틀 씬 -->
  <section id="scene-title" class="scene active">
    <div id="title-floats" class="title-floats" aria-hidden="true"></div>
    <button id="btn-options" class="round-btn title-options" type="button" aria-label="설정">
      <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true">
        <g fill="#5B4A43">
          <rect x="10.6" y="1.2" width="2.8" height="4.2" rx="1.2"/>
          <rect x="10.6" y="1.2" width="2.8" height="4.2" rx="1.2" transform="rotate(45 12 12)"/>
          <rect x="10.6" y="1.2" width="2.8" height="4.2" rx="1.2" transform="rotate(90 12 12)"/>
          <rect x="10.6" y="1.2" width="2.8" height="4.2" rx="1.2" transform="rotate(135 12 12)"/>
          <rect x="10.6" y="1.2" width="2.8" height="4.2" rx="1.2" transform="rotate(180 12 12)"/>
          <rect x="10.6" y="1.2" width="2.8" height="4.2" rx="1.2" transform="rotate(225 12 12)"/>
          <rect x="10.6" y="1.2" width="2.8" height="4.2" rx="1.2" transform="rotate(270 12 12)"/>
          <rect x="10.6" y="1.2" width="2.8" height="4.2" rx="1.2" transform="rotate(315 12 12)"/>
          <circle cx="12" cy="12" r="7.2"/>
          <circle cx="12" cy="12" r="3" fill="#fff"/>
        </g>
      </svg>
    </button>
    <h1 class="logo" aria-label="한글 동물원">
      <span class="logo-tile c0">한</span><span class="logo-tile c1">글</span>
      <span class="logo-gap"></span>
      <span class="logo-tile c2">동</span><span class="logo-tile c3">물</span><span class="logo-tile c4">원</span>
    </h1>
    <p class="subtitle">동물 이름으로 배우는 신나는 한글!</p>
    <p class="tap-hint">👆 화면을 눌러 시작!</p>
    <div class="title-footer">
      <span id="title-progress" class="star-progress">⭐ 0/0</span>
      <button id="btn-collection" class="chip-btn" type="button">📖 도감</button>
    </div>
  </section>

  <!-- 게임 씬 -->
  <section id="scene-game" class="scene">
    <header class="game-top">
      <button id="btn-home" class="round-btn" type="button" aria-label="처음 화면으로">🏠</button>
      <div class="game-title">한글 동물원</div>
      <div class="top-actions">
        <button id="btn-next" class="round-btn" type="button" aria-label="다음 동물">
          <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true">
            <path d="M13 5.6 20.4 12 13 18.4 V14.2 H3.6 v-4.4 H13 Z"
              fill="#4FBFA0" stroke="#4FBFA0" stroke-width="2.4" stroke-linejoin="round"/>
          </svg>
        </button>
        <button id="btn-exit" class="round-btn gone" type="button" aria-label="연습 종료">
          <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
            <g stroke="#FF8A93" stroke-width="4.4" stroke-linecap="round">
              <path d="M7 7 17 17"/><path d="M17 7 7 17"/>
            </g>
          </svg>
        </button>
      </div>
    </header>
    <main class="game-main">
      <div class="animal-card">
        <img id="animal-img" alt="" draggable="false">
      </div>
      <div id="blanks" class="blanks"></div>
    </main>
    <div id="tile-tray" class="tile-tray"></div>
    <div id="praise" class="praise hidden">
      <div class="praise-word" id="praise-word"></div>
      <div class="praise-text">🎉 참 잘했어요! 🎉</div>
      <button id="btn-next-big" class="big-btn" type="button">다음 동물</button>
    </div>
  </section>

  <!-- 도감 씬 -->
  <section id="scene-collection" class="scene">
    <header class="game-top">
      <button id="btn-back" class="round-btn" type="button" aria-label="뒤로 가기">⬅️</button>
      <div class="game-title">📖 동물 도감</div>
      <span id="collection-progress" class="star-progress">⭐ 0/0</span>
    </header>
    <div id="collection-grid" class="collection-grid"></div>
    <p class="credit">동물 그림: AI 생성 이미지 (OpenAI · Codex CLI)</p>
  </section>

  <!-- 설정 모달 -->
  <div id="options-modal" class="modal hidden">
    <div id="modal-backdrop" class="modal-backdrop"></div>
    <div class="modal-card">
      <h2 class="modal-title">
        <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
          <g fill="#5B4A43">
            <rect x="10.6" y="1.2" width="2.8" height="4.2" rx="1.2"/>
            <rect x="10.6" y="1.2" width="2.8" height="4.2" rx="1.2" transform="rotate(45 12 12)"/>
            <rect x="10.6" y="1.2" width="2.8" height="4.2" rx="1.2" transform="rotate(90 12 12)"/>
            <rect x="10.6" y="1.2" width="2.8" height="4.2" rx="1.2" transform="rotate(135 12 12)"/>
            <rect x="10.6" y="1.2" width="2.8" height="4.2" rx="1.2" transform="rotate(180 12 12)"/>
            <rect x="10.6" y="1.2" width="2.8" height="4.2" rx="1.2" transform="rotate(225 12 12)"/>
            <rect x="10.6" y="1.2" width="2.8" height="4.2" rx="1.2" transform="rotate(270 12 12)"/>
            <rect x="10.6" y="1.2" width="2.8" height="4.2" rx="1.2" transform="rotate(315 12 12)"/>
            <circle cx="12" cy="12" r="7.2"/>
            <circle cx="12" cy="12" r="3" fill="#fff"/>
          </g>
        </svg>
        설정
      </h2>
      <p id="options-progress" class="modal-progress">⭐ 0/0</p>
      <div id="options-main">
        <button id="btn-reset" class="modal-btn danger" type="button">🗑️ 기록 초기화</button>
      </div>
      <div id="options-confirm" class="gone">
        <p class="confirm-text">얻은 동물과 정답 기록이<br>모두 지워져요. 정말 지울까요?</p>
        <div class="confirm-actions">
          <button id="btn-reset-yes" class="modal-btn danger" type="button">네, 지울래요</button>
          <button id="btn-reset-no" class="modal-btn" type="button">아니요</button>
        </div>
      </div>
      <button id="btn-options-close" class="round-btn modal-close" type="button" aria-label="닫기">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <g stroke="#8a766d" stroke-width="4.4" stroke-linecap="round">
            <path d="M7 7 17 17"/><path d="M17 7 7 17"/>
          </g>
        </svg>
      </button>
    </div>
  </div>

  <canvas id="confetti" aria-hidden="true"></canvas>

  <script src="js/app.js"></script>
</body>
</html>
